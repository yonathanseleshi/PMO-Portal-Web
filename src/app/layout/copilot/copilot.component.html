<!-- Collapsible/Expandable Trigger Toggle Button (always visible floating at the bottom right) -->
<button 
  (click)="toggleOpen()"
  class="fixed right-6 bottom-6 w-14 h-14 rounded-full bg-gradient-to-tr from-[#1e5fa5] to-[#0f2d52] hover:from-[#1565c0] hover:to-[#0b2444] text-white flex items-center justify-center shadow-lg border border-white/10 transition-all duration-200 cursor-pointer z-50 hover:scale-105"
  [class.rotate-180]="isOpen()"
>
  @if (isOpen()) {
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
    </svg>
  } @else {
    <div class="relative">
      <!-- Star / Sparkle AI theme -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l-.813-5.096L3.104 15l5.096-.813L9 9l.813 5.096 5.096.813-5.096.813zM19.071 5.929l-.213 1.282-.213-1.282L17.363 5.5l1.282-.213.213-1.282.213 1.282 1.282.213-1.282.213z" />
      </svg>
    </div>
  }
</button>

<!-- Slide-out Frosted Copilot Panel -->
<div 
  class="h-full w-[360px] border-l border-[#dde2e8] flex flex-col transition-all duration-300 ease-out relative z-30"
  [ngStyle]="{
    'margin-right': isOpen() ? '0px' : '-360px',
    'opacity': isOpen() ? '1' : '0',
    'pointer-events': isOpen() ? 'auto' : 'none',
    'background': 'rgba(255, 255, 255, 0.9)',
    'backdrop-filter': 'blur(12px)',
    '-webkit-backdrop-filter': 'blur(12px)'
  }"
>
  <!-- Panel Header -->
  <div class="p-4 border-b border-[#eef2f6] flex items-center justify-between bg-white/50">
    <div class="flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" class="w-5 h-5 text-[#d4a63a]">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l-.813-5.096L3.104 15l5.096-.813L9 9l.813 5.096 5.096.813-5.096.813z" />
      </svg>
      <span class="font-extrabold text-sm text-[#0f2d52] uppercase tracking-wider">PMO Copilot</span>
    </div>
    <span class="text-[10px] font-bold bg-[#f1f6fb] text-[#1e5fa5] px-2 py-0.5 rounded-full uppercase">AI Assistant</span>
  </div>

  <!-- Chat Messages -->
  <div class="flex-1 p-4 overflow-y-auto space-y-4 vc-scroll bg-transparent">
    @for (msg of messages(); track msg.text) {
      <div class="flex flex-col" [class.items-end]="msg.sender === 'user'" [class.items-start]="msg.sender === 'ai'">
        <div 
          class="max-w-[85%] rounded-[14px] p-3 text-sm leading-relaxed"
          [ngClass]="{
            'bg-[#0f2d52] text-white rounded-br-sm shadow-sm': msg.sender === 'user',
            'bg-white border border-[#eef2f6] text-[#0f2d52] rounded-bl-sm shadow-sm': msg.sender === 'ai'
          }"
        >
          {{ msg.text }}
        </div>
        <span class="text-[10px] text-slate-400 mt-1 px-1">{{ msg.time }}</span>
      </div>
    }
  </div>

  <!-- Suggestion Chips -->
  @if (messages().length === 1) {
    <div class="p-4 border-t border-[#eef2f6]/50 bg-white/20">
      <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Suggested Prompts</span>
      <div class="flex flex-wrap gap-1.5">
        @for (prompt of suggestedPrompts; track prompt) {
          <button 
            (click)="sendMessage(prompt)"
            class="text-left text-xs bg-white hover:bg-slate-50 text-slate-600 hover:text-[#1e5fa5] px-3 py-2 rounded-lg border border-[#eef2f6] transition-all duration-150 cursor-pointer w-full leading-tight shadow-sm"
          >
            {{ prompt }}
          </button>
        }
      </div>
    </div>
  }

  <!-- Disclaimer & Input Area -->
  <div class="p-4 border-t border-[#eef2f6] bg-white">
    <!-- Required Disclaimer -->
    <div class="text-[10px] text-slate-400 font-medium leading-relaxed mb-3 text-center border-b border-[#eef2f6] pb-2.5">
      <strong>Notice:</strong> Copilot assists with PMO work. It does not make official governance decisions.
    </div>

    <!-- Input Bar -->
    <form (submit)="sendMessage(userInput())" class="flex items-center gap-2">
      <input 
        type="text" 
        [(ngModel)]="userInput" 
        name="userInput"
        placeholder="Ask a question..."
        class="flex-1 h-10 px-3 rounded-lg border border-[#dde2e8] text-sm focus:outline-none focus:border-[#1e5fa5] focus:ring-2 focus:ring-blue-100 transition-all placeholder-slate-400 text-[#0f2d52]"
      />
      <button 
        type="submit"
        class="w-10 h-10 rounded-lg bg-[#0f2d52] hover:bg-[#1e5fa5] text-white flex items-center justify-center transition-colors duration-150 cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
        </svg>
      </button>
    </form>
  </div>
</div>
