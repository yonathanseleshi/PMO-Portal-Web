<header class="h-[60px] bg-white border-b border-[#eef2f6] px-6 flex items-center justify-between shadow-sm relative z-20">
  <!-- Left info section (Civic bar or greeting) -->
  <div class="flex items-center gap-4">
    <div class="flex flex-col">
      <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Ventura County ITS</span>
      <span class="text-sm font-extrabold text-[#0f2d52]">PMO Governance Portal</span>
    </div>
  </div>

  <!-- Right actions & User Profile lockup -->
  <div class="flex items-center gap-4">
    <!-- Role Switcher (Highly requested for role-aware demo validation) -->
    <button 
      (click)="toggleRole()"
      class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border border-[#dde2e8] bg-slate-50 text-xs font-bold text-slate-700 hover:bg-slate-100 hover:border-slate-300 transition-all duration-150 cursor-pointer"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-[#1e5fa5]">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.656 48.656 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7C4.045 9.547 4 10.768 4 12c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.092-1.209.138-2.43.138-3.662z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5" />
      </svg>
      <span>Switch to {{ getCurrentUser().role === 'pmo' ? 'PM View' : 'PMO Lead View' }}</span>
    </button>

    <!-- User Information -->
    <div class="h-6 w-px bg-slate-200"></div>

    <div class="flex items-center gap-3">
      <div class="text-right hidden sm:flex flex-col">
        <span class="text-xs font-bold text-slate-800">{{ getCurrentUser().username }}</span>
        <span class="text-[10px] text-[#1e5fa5] font-extrabold uppercase tracking-wider">
          {{ getCurrentUser().role === 'pmo' ? 'PMO Lead' : 'Project Manager' }}
        </span>
      </div>
      <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-[#1e5fa5] to-[#0f2d52] text-white flex items-center justify-center font-black text-sm border border-white/20 shadow-sm">
        {{ getCurrentUser().role === 'pmo' ? 'JO' : 'MA' }}
      </div>
    </div>
  </div>
</header>
