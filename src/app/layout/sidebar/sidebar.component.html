<div class="h-full w-[256px] flex flex-col bg-gradient-to-b from-[#0f2d52] via-[#0b2444] to-[#08192e] text-[#dbe4f0] border-r border-[#08192e] shadow-lg select-none">
  <!-- Brand Logo & Lockup -->
  <div class="p-6 border-b border-white/5 flex items-center gap-3">
    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-[#1e5fa5] to-[#1976d2] shadow-md flex items-center justify-center font-extrabold text-base text-white tracking-tight border border-white/10">
      VC
    </div>
    <div class="flex flex-col">
      <span class="text-xs font-bold uppercase tracking-wider text-[#d4a63a]">ITS Portal</span>
      <span class="text-[10px] text-[#8fa8c9] font-medium tracking-wide">County of Ventura</span>
    </div>
  </div>

  <!-- Navigation Items (role-aware) -->
  <nav class="flex-1 py-6 overflow-y-auto vc-scroll" aria-label="Primary">
    @for (group of groups(); track group.heading) {
      <div class="px-3 mb-3" [class.mt-4]="!$first">
        <p class="text-[10px] font-bold uppercase tracking-wider text-[#8fa8c9] px-3 m-0">{{ group.heading }}</p>
      </div>
      <div class="flex flex-col gap-1 px-3 mb-2">
        @for (item of group.items; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-white/10 text-white font-semibold"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-[#8fa8c9] hover:bg-white/5 hover:text-white transition-all duration-150 group"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 opacity-75 group-hover:opacity-100 transition-opacity shrink-0" aria-hidden="true">
              @for (path of item.iconPaths; track path) {
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="path" />
              }
            </svg>
            <span class="flex-1 truncate">{{ item.label }}</span>
            @if (item.badge) {
              <span class="bg-[#d4a63a] text-black text-[10px] px-1.5 py-0.5 rounded-full font-bold">{{ item.badge }}</span>
            }
          </a>
        }
      </div>
    }
  </nav>

  <!-- Footer metadata / User lockup -->
  <div class="p-4 border-t border-white/5 bg-[#08192e]">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#d4a63a] to-[#ffda7a] text-black font-extrabold text-xs flex items-center justify-center">
        {{ initials() }}
      </div>
      <div class="flex flex-col min-w-0">
        <span class="text-xs font-bold text-white truncate">{{ displayName() }}</span>
        <span class="text-[10px] text-[#8fa8c9] uppercase tracking-wider font-semibold">{{ roleLabel() }}</span>
      </div>
    </div>
  </div>
</div>
