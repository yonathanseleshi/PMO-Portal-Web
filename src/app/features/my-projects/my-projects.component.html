<pmo-page-header
  [title]="portfolioWide ? 'My Projects' : 'My Projects'"
  [breadcrumbs]="['Home', 'My Projects']"
>
  <a actions routerLink="/templates" class="inline-flex items-center gap-2 h-9 px-3.5 rounded-lg bg-[#0f2d52] hover:bg-[#1e5fa5] text-white text-xs font-bold transition-colors duration-150">
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
    <span>Start a Submission</span>
  </a>
</pmo-page-header>

@if (loading()) {
  <pmo-loading-state variant="skeleton" [rows]="5" message="Loading your projects…" />
} @else if (errored()) {
  <pmo-error-state message="We couldn't load your projects right now." />
} @else if (rows().length === 0) {
  <pmo-empty-state
    title="No projects assigned"
    message="You don't have any projects yet. Submit an intake to begin a new project, or contact the PMO to be added to an existing one."
  >
    <a actions routerLink="/templates" class="inline-flex items-center gap-2 h-10 px-4 rounded-lg bg-[#0f2d52] hover:bg-[#1e5fa5] text-white text-sm font-bold transition-colors duration-150">
      Browse Templates
    </a>
  </pmo-empty-state>
} @else {
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    @for (p of rows(); track p.id) {
      <pmo-card [interactive]="true" [ragBorder]="ragTone(p.healthRag)">
        <a [routerLink]="['/projects', p.id]" class="block p-1 no-underline">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="text-[11px] font-mono text-slate-400 m-0">{{ p.projectCode }}</p>
              <h3 class="text-sm font-extrabold text-[#0f2d52] mt-0.5 mb-0 leading-snug truncate">{{ p.projectName }}</h3>
            </div>
            <pmo-rag-indicator [status]="ragTone(p.healthRag)" />
          </div>
          <div class="flex items-center gap-2 mt-3">
            <pmo-badge [type]="tierType(p.tier)" [text]="tierLabels[p.tier]" />
            <pmo-badge type="info" [text]="phaseLabels[p.phase]" />
          </div>
          <div class="flex items-center justify-between mt-4 pt-3 border-t border-[#eef2f6] text-[11px] text-slate-500 font-medium">
            <span>PM: {{ p.projectManagerName || '—' }}</span>
            <span>{{ p.daysInPhase }}d in phase</span>
          </div>
        </a>
      </pmo-card>
    }
  </div>
}
